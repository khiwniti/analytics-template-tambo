kind = "web"
previewPath = "/"
title = "Tambo Analytics"
version = "1.0.0"
id = "artifacts/tambo-analytics"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25474

[services.development]
run = "pnpm --filter @workspace/tambo-analytics run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tambo-analytics", "run", "build" ]
publicDir = "artifacts/tambo-analytics/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25474"
BASE_PATH = "/"
